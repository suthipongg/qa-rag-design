services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qa-rag-qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  backend:
    build:
      context: ./backend
    container_name: qa-rag-backend
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    environment:
      - QDRANT_HOST=qdrant
      - DATABASE_URL=sqlite:///./data/app_data.db
    env_file:
      - ./backend/.env
    depends_on:
      - qdrant

  frontend:
    build:
      context: ./frontend
    container_name: qa-rag-frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  qdrant_data:
  backend_data:
  backend_uploads:
